body:
  text: 摩訶梵語也華云大般若亦梵語華云智慧波羅蜜多亦梵語華云到彼岸是對衆生生死苦同於大海而將如來涅槃樂立為彼岸須用智慧作船筏方可渡過苦海得到彼岸也心者乃大般若之中心該六百卷之奧義如人之一心能統四肢百骸也經者徑也入道之徑路也言此經乃以廣大智慧得到諸佛彼岸之徑路而此一卷又般若經之中心實六百卷之扼要也此經以單法為名空相為體觀照為宗度苦為用大乘為教相蓬萊王澤泩巨川一注解頌曰這點靈光道上來只因逐妄墮塵埃君今要見還鄉路悟得心經道眼開分顯通經分顯密二大分自首至三菩提為顯說顯中分七自故知至末為密說密中分三共十分初菩薩修證分十分乃一寬法師所科今仍之其餘小分煩多一槩刪去觀自在菩薩菩薩梵語也華言覺衆生觀自在即是觀世音以其用甚智慧觀見自心清淨圓通無礙優游自在故又名觀自在菩薩行深般音鉢若音野波羅蜜多時行者修行也深般若者實相般若也非粗心淺智者所觀故云深也般若云智慧即生佛同具本覺本明之心也波羅蜜多云到彼岸此菩薩修行深廣智慧得達涅槃彼岸的時候照見五蘊皆空照即觀也照見者看破也蘊者積聚也五者色受想行識也色者色身受者領納想者思想行者造作識者分別有此五件積聚蓋覆不能看破妄認色身是我所以長劫輪回永無出期惟菩薩修行般若既深自能觀照洞見吾身中色受想行識這五樣蘊積本來無有盡屬虗妄而非真實知無一法不從性幻有而無一法不同性本空也問五蘊怎得皆空答云如頭目腦髓俱可捨施割截侵凌總無嗔恨便是色蘊空也如遇一切境物心不領納見如不見便是受蘊空也如過去不思未來不念現在無心便是想蘊空也如不被物轉不隨境遷全無動作便是行蘊空也如見一切境物都無分別平等視之便是識蘊空也既見蘊空便能拔去輪回根本斷絶生死種子永脫娑婆苦趣矣度一切苦厄度者脫也一切者大凡也一切苦厄者世間衆生之一切困苦災厄也菩薩既空五蘊是自己已離生死苦海矣又憫在迷衆生被五蘊蒙蔽不能照破致受衆苦故說這般若法門使一切衆生皆得聞而修習之以度脫其困苦災厄如駕大船載渡衆生送過苦海直登彼岸而後已焉觀自在句是通篇總冒行深句申所修內觀之因照見句申所得自在之果度一切句申所證菩薩之位此三句是通篇總承明初僧如玘奉詔注曰已上一段乃阿難結集經藏時敘述觀自在度生之功行此是別序也下段自舍利子起始是觀自在答舍利子所問也二色空正義分舍利子舍利梵語也華云鶖鷺其鳥眼利尊者母目如之故名舍利子亦云鶖子佛之弟子智慧第一竺法護尊者所譯本云爾時世尊在靈鷲山入甚深光明三摩提舍利子白觀自在菩薩言若有人欲修學甚深般若法門者云何修學菩薩承佛威神為宣般若部中精要之義曰舍利子你聽著無垢子注云舍者屋舍利子者舍中之本來大謬色不異空欲修甚深般若者當明色空正義如四大幻身謂色般若真體謂空凡夫執著色相則見以為色與空異矣不知色從妄生還從妄滅則其生相全是滅相既是滅相何異空相色與空體固無殊也蓋色猶氷而空猶水如悟氷因水有則知色不異空何以故色由空生也色固不可執矣空不異色外道斷見謂無因果二乘偏空灰身泯智則見以為空與色異矣不知至虗而納天下之至實至無而涵天下之至有空與色體亦無殊也蓋空猶水而色猶氷如悟水由氷融則知空不異色何以故空因色顯也空亦豈可執乎色即是空空即是色然但言不異猶是二物有對其實色非窒礙之色幻色全體是空色之外別無空矣空非斷滅之空真空大用即色空之外別無色矣如氷即是水水即是氷不必存色空二見非但無色而亦無空此真空也受想行識亦復如是不但色蘊如是空也至於受蘊想蘊行蘊識蘊亦復當作如是不異空即是空觀焉夫而後五蘊乃得皆空矣蓋蘊無自性本幻有故故皆空空無別體無不體故故皆真也此段示人以空五蘊詳申行深句以應觀字意三空生生滅分舍利子舍利子我再告汝是諸法空相道五蘊諸法其真空的實相尚無空可名何況更有生滅垢淨增減等名相不生不滅真空本無生起非緣合初際幻現有生者比也真空亦無寂滅非緣離后際變壞有滅者比也如珠現五色而珠體未嘗有生五色遽亡而珠體未嘗有滅不垢不淨垢者塵垢從染緣結業而有六道輪回為垢真空從不受染淨者清淨隨淨緣而斷無明成涅槃淨德為淨真空亦不受淨不增不減雖三智同圓萬行俱足亦體所本具在聖不能增益分毫縱在六凡淪沒四生皆具佛性在凡亦未嘗減損少許非臆之也真空原無是耳此段推真空本來無蘊四法離染淨分是故空中無色無受想行識因這空無生滅之故所以說真空之中本無色身無領受無思想無造作無識別此五蘊皆空也以下諸無字有二義一本無之謂一不有之謂無眼耳鼻舌身意然不但空五蘊已也真空中亦無眼根無耳根無鼻根無舌根無身根無意根六根亦皆空也無色聲香味觸法然不但空六根已也如眼有色塵耳有聲塵鼻有香塵舌有味塵身有觸塵意有法塵真空中俱無此等六塵亦皆空也根塵俱空所謂空十二入也無眼界乃至無意識界然不但空十二入已也真空中無眼耳鼻舌身意六根界亦無色聲香味觸法六塵界又見為眼識聞為耳識嗅為鼻識嘗為舌識染為身識分別為意識真空中亦無眼識界無耳識界無鼻識界無舌識界無身識界乃至無意識界此無六識界也合之是空十八界也以上是無衆生法十八界者六根六塵六識之境界也乃至云者舉始末而略其中也此譯者之省文恐初學難曉故為一一補出無無明亦無無明盡乃至無老死亦無老死盡然不但空十八界已也即十二因緣亦皆空焉十二因緣者何法華經云無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死緣者互相由藉之謂也無明者謂性智本明妙湛精了由妄塵瞥起俄然晦昧名無明過去一切煩惱皆是體即是癡失其本明入於迷惑也行者於過去世造作諸業名為行由惑造業有無明因以生行故曰無明緣行此二者屬過去世之因也行緣識者晦昧動搖則失彼精了粘湛發知故轉智名識有了別義以行之善惡種子熏入第八識隨其業牽致令此識投托母胎即人之魂識有行因以有識故曰行緣識也識緣名色者名即受想行識四心法以有名無形質也色即父母赤白二滴加己靈種子攬其赤白染愛為因納想成胎形為幻質則名色者識初投胎凝滑之相有識因以有名色故云識緣名色也名色緣六入者胎由凝滑而其六根以根有入塵之義名為入有名色因以成就六根故云名色緣六入也六入緣觸者根成出胎至三四歲根與境交未能了知但兩相對觸而已有六入因以有觸故云六入緣觸也觸緣受者領納為受從五六歲至十二三因六塵對觸六根即納前境雖未能起貪愛之心然好惡等事粗能了別有觸因有領納故云觸緣受此五者屬現在之果也受緣愛者從十四五至十八九貪於種種勝妙資具及色欲等境由領納故即起貪愛故云受緣愛也愛緣取者從二十歲後見一切欲境皆生取著心思欲廣遍追求由愛生著故云愛緣取也取緣有者既著諸境惑業相結善惡有狀因果不亡名有由愛取故積聚牽引因生諸有故云取緣有此三者屬現在之因又以致未來生死之果也有緣生者謂六道中受生也既因果不亡隨善惡業相結為來世之生故云有緣生也生緣老死者受生之身熟壞名老死既有生終歸老死故云生緣老死此二者屬未來世之果也此十二者緣覺所修之法乃學道之要旨故解之不厭其詳要之諸緣雖多皆因無明而起是無明者乃生死之根輪回之本也欲修行般若者當以滅無明為先惟以般若智觀照見無明其性本空非實有體則智性真淨復還妙湛洞徹精了是為無明滅滅則無有無明亦無無明到淨盡處無明既盡則自行識以下莫不皆盡蓋本既不存末安所附吾知無行亦無行盡無識亦無識盡無名色亦無名色盡無六入亦無六入盡無觸亦無觸盡無受亦無受盡無愛亦無愛盡無取亦無取盡無有亦無有盡無生亦無生盡乃至無老死亦無老死到淨盡處蓋無明既滅則諸漏自盡煩惱自斷三毒自消萬劫塵沙數罪一時頓息生死輪回根本一時頓除矣此空十二因緣也是無緣覺法無苦集滅道然不但空十二因緣也如生死苦果曰苦謂生老病死五陰熾求不得冤憎會愛別離八苦現前逼惱也惑業苦因曰集謂煩惱結業召致八苦過去集致現在苦現在集致未來苦也此二者世間之因果也涅槃樂果曰滅謂結業盡則生死八苦永盡也道品樂因曰道謂治結業須修三十七道品也此二者出世間之因果也三十七道品詳見卷末說此四諦者欲令衆生知苦斷集慕滅修道離苦得樂也此本聲聞之人所觀之境大乘菩薩照了此境當體空寂不但無苦集亦無滅道此空四諦也是無聲聞法無智亦無得不但空四諦也如能觀之慧為智所照之理為得此二者菩薩法也以法而言智理全是空的不容別有有即是妄是本無也以人而言則修般若人能所兩忘智理俱泯是能無也能無既盡與本無已契尚何智得之有乎此人法皆空也是無菩薩法真空之無所得如此此段自是故空中至此明初地至大乘皆當了此蘊空法以復真體詳申五蘊皆空句以應自在意五蘊顯無得分以無所得故因這一無所得的緣故此句雖承上起下之文然無所得是入般若之要門而修般若之大途故特立標顯無得為一科學者宜知所鏡也六明菩薩依分菩提薩埵梵語也略云菩薩華言覺有情埵音垛故菩薩起初依般若波羅蜜多遵依著以智慧到彼岸的法門修學洞見自性清淨證入真空故因這緣故心無罣音卦礙所以不為蘊等諸法所牽罣不為生滅等諸相所窒礙清淨本然周遍自在無罣礙故因這心無牽卦無窒礙的緣故無有恐怖怖音布畏也世間衆生由貪戀迷惑為罣礙故恐生死之尋怖煩惱之障雖修出世法者由虗妄希求為罣礙於本幻之生死而生恐於非真之果報而生怖情存勝見心希妙境天魔伺便為作侵擾令人俱畏既無罣礙則心無業縛如太虗空更有甚麼可怕有甚麼可畏遠離顛倒夢想迷真曰顛逐妄曰倒夢者神遊妄境夙習未亡也想者攀緣亂想識性妄行也皆是妄為五蘊所纏凡夫之倒想也二乘所修諦緣之法亦同顛倒期虗幻之果亦同夢想總由不能無罣礙之心耳遠離者諸障本從罣礙而生罣礙既空則顛倒夢想諸障自遠遠離去矣究竟涅槃到底得箇大滅度大清淨而直登諸佛彼岸矣涅槃云大滅度乃大清淨處無生無滅之地七明諸佛依分三世諸佛不但菩薩如此修證即過去現在未來這三世的諸佛依般若波羅蜜多故起初亦皆依著這以智慧而到彼岸的法門修行因證真空故得阿耨多羅三藐三菩提所以得成這無上正等正覺的果位梵語阿耨多羅華云無上梵語語三藐華云正等梵語三菩提華云正覺菩薩依般若而得涅槃諸佛依般若而得菩提為佛佛大同之道萬法流出之宗者惟般若之法哉密分自故知至末為密說密中分三初呪義結經分故知般若波羅蜜多因這緣故乃知以智慧而到彼岸的法門祕密神妙有呪義焉是大神呪衆生自無始以來妄結五蘊根塵等法迷強難破一時空於觀照之智則般若功用如勇猛之神兵能破衆魔是大神之密呪也是大明呪靈鑒全彰真理洞徹諦緣俱遣智得雙亡則般若功用如長夜之明燈能破幽暗是大明之密呪也是無上呪菩薩依之而究竟涅槃則般若功用既神且明能臻至詣是無以加上之密呪也是無等等呪諸佛依之而得菩提則般若神功無與同者非特無上是並無與之齊等的密呪也二先出呪益分能除一切苦般若呪之功用廣大如此自能消除世間一切苦厄令衆生得大快樂真實不虗我所說的都是真實話不比虗妄衆生所當歡喜信受而奉以為脫苦之良方者也而要非證真空者不能自以無所得至此段詳申度一切苦厄以應菩薩意三標名說呪分十分畢故說般若波羅蜜多呪般若呪之能除苦如此所以要把這呪明白說出令大衆得知以便持誦呪以祕密為體以神妙為用以感應不可思議為相但令人受利受樂不令人生知生見此呪義也即說呪曰即便說呪與衆生共聽曰揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆訶此呪語也呪語古皆不翻略有五義一是諸佛密語惟佛與佛能相解了非下凡所知二是總持一一字句含藏多義三或是鬼神王名呼之敕以守護行人四是諸佛密印如王印信無往不通五不思議力所加持但能密誦即獲密益故皆不翻注者亦都不加解釋恐其獲罪故也寬大師曰近有將楞嚴大悲等呪杜譯謬解者破壞佛法可笑可嘆彼自詡能闡祕密不知正是謗毀如來正法輪也抑聞之賢首曰梵語揭諦此云度又言揭諦者自度度他也梵語波羅此云彼岸言彼岸可度而到也梵語僧此云衆也普也言自他普度總到彼岸也菩提者到何等彼岸謂大菩薩處也梵語薩婆訶此云疾速也言願令所作疾速成就也或又曰揭諦揭諦者即大神之意也波羅揭諦者即大明之意也波羅僧揭諦者即無上之意也菩提薩婆訶者即無等等之意也此二說似可從姑存以饜求解者之心然違不翻之例故不敢編入正注也要之呪語不翻者一明言說相空一明心緣相空欲令人斷言語之道息思想之心萬法歸一故也又呪者將全經大意總括於幾句密語之中經即是顯說的呪呪即是密說的經兼持則雙美備具單誦亦交攝不遺持呪即持經知經即知呪固不必強求解說也末段呪語總收全文補遺三十七道品謂四念處四正勤四神足五根五力七覺支八正道也四念處者身也受也心也法也蓋佛示權機入觀之智當須觀身不淨觀受是苦觀心無常觀法無我此乃從凡入聖最初一步下手工夫念念無間故云念處也四正勤者已作之惡勤令不增未作之惡勤令不起已作之善勤令增長未作之善勤令得生也四神足者集也心也進也我也集即煩惱定斷心即如常在念進即一刻無間我即打成一片也五根者信根進根念根定根慧根也謂信而不疑進而不退念而不息定而不散慧而不沉也五力者即信力進力念力定力慧力也七覺支者念擇進喜輕定捨也念謂心心不住一刻不停也擇者揀擇真僞能辨緇朱也進者直而不枉勇猛無曲也喜者得乎禪悅通身踴躍也輕者頓歇塵勞心得自在也定者埋根千尺八風不動也舍者根塵解脫不復緒生也八正道者見思語業命進念定也正見者無一異有無斷常等見也正思者六識空空意清淨也正語者歌佛法僧口清淨也正業者無殺盜淫身清淨也正命者緒佛之慧入乎聖流也正進者精而無雜不憚疲倦也正念者一心不亂切之又切也正定者超乎四禪四空一切諸有也
