body:
  text: 般若波羅蜜多心經句解易知序般若心經者大般若之中心六百卷之綱要五千大藏之骨髓成佛作祖之根源也然則欲了生死脫輪迴者舍是無徑矣此所以誦持之盛盈於環海歟𮨇誦者雖多明者實少非是經之難曉亦非眾生之多愚患在註無善本耳目淆亂故也盖此經自入中夏以來註釋者不下數十餘家然或借徑遺經自抒胸臆其與佛之本旨相去不啻千里而遙即有與經意合者又或略說大意字句鮮釋初學難通甚為未便間有鑒此獘而反之者又或誇多闘靡遠引博徵蕪詞愈繁真旨愈晦覽者茫然不知所謂此明是經者之所由鮮其人也泩憫是苦爰發大願誓成善註用啟羣蒙於是廣搜眾疏扃戶澄觀抉擇務精取舍惟慎善者從之不善斯改研思三載始克成編如舊註科判𤨏碎概從節省不煩不漏亦淺亦粗但取理明無嫌詞鄙盖欲人人易曉也書成名曰句解易知仍用余金剛經解之舊名而不易者以余之素志然也夫達摩西來不立文字直指人心見性成佛是經猶糟粕註更贅疣而余之不憚疲勞不辭譏謗以作此蛇足語者誠欲初機之士一覺即知如迷津之得寶筏則苦海易渡彼岸易登脫輪迴而了生死者未必不由此愈多也惓惓之心實難自已或曰子發明此一段大道理殊勝人間富貴功名萬億倍也然余何敢云然亦聊為新學行遠自邇登高自卑之一助耳旹乾隆廿九年甲申三月穀旦歸一居士王澤泩謹序
